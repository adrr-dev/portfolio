<section id="projects-list">
  <h2>My Projects</h2>
  <div class="projects-grid">
    {{ range . }}
    <article class="project-card">
      <header>
        <h3>{{.Name}}</h3>
      </header>
      <div class="project-body">
        <p>{{.Info}}</p>
      </div>
      <footer>
        <a href="{{.Repo}}" target="_blank" rel="noopener">View Repository</a>
      </footer>
    </article>
    {{ else }}
    <p>No projects found. Check back soon!</p>
    {{ end }}
  </div>
</section>
